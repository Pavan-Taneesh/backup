<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>med-EZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@700&family=Roboto:wght@400&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #dedef0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Roboto', sans-serif;
    }

    .container {
      text-align: center;
    }

    .logo {
      font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .m { color: #EA4335; }
    .e { color: #4285F4; }
    .d { color: #34A853; }
    .dash {
      color: #FBBC05;
      font-size: 60px;
      vertical-align: middle;
      display: inline-block;
      margin: 0 2px;
    }
    .E { color: #EA4335; }
    .Z { color: #4285F4; }

    .tagline {
      font-size: 18px;
      color: #7A8AA0;
      margin-bottom: 36px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .btn {
      display: inline-block;
      background-color: #4285F4;
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      padding: 16px 48px;
      border-radius: 50px;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(66, 133, 244, 0.4);
      letter-spacing: 0.3px;
    }

    .btn:hover {
      background-color: #3367D6;
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(66, 133, 244, 0.5);
    }

    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="m">m</span><span class="e">e</span><span class="d">d</span><span class="dash">—</span><span class="E">E</span><span class="Z">Z</span>
    </div>
    <p class="tagline">Healthcare, made simple.</p>
    <a href="ui2.html" class="btn">Let's Go →</a>
  </div>
</body>
</html>
